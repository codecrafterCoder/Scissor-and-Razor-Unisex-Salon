<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section  form id="bookingForm" class="booking-form"></form>>

    <h1>Book Your Appointment</h1>

    <form id="bookingForm" class="booking-form">

        <input type="text" placeholder="Your Name" required>

        <input type="tel" placeholder="Phone Number" required>

        <select required>
            <option value="">Select Service</option>
            <option>Haircut</option>
            <option>Beard Styling</option>
            <option>Spa</option>
            <option>Facial & Massage</option>
            <option>Manicure & Pedicure</option>
            <option>Hydra Facial</option>
            <option>Hair Color & Highlights</option>
            <option>Hair Straightening</option>
            <option>Keratin Treatment</option>
            <option>Hair Spa</option>
            <option>Hair Smoothening</option>
        </select>

        <input type="date" required>

        <input type="time" required>

        <button type="submit">Book Appointment</button>

    </form>

</section>

<script src="script.js"></script>
</body>
</html>
